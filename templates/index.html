<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNA Folding Game - LNF 2026</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fornac.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>RNA Engineering Station</h1>
    
    <div id="app-container">
        <p>Backend Status: <span style="color: green;">Online</span></p>
        
        <div id="rna_container"></div>
        
        <div id="mutation-menu" class="mutation-menu" style="display: none;">
            <p style="margin: 0 0 5px 0; font-size: 12px; font-weight: bold;">Mutate to:</p>
            
            <button class="base-btn btn-A" onclick="mutateNode('A')">A</button>
            <button class="base-btn btn-U" onclick="mutateNode('U')">U</button>
            <button class="base-btn btn-G" onclick="mutateNode('G')">G</button>
            <button class="base-btn btn-C" onclick="mutateNode('C')">C</button>
            
            <button class="close-btn" onclick="document.getElementById('mutation-menu').style.display='none'">×</button>
        </div>

        
    </div>

    <script src="{{ url_for('static', filename='js/jquery.js') }}"></script>
    <script src="{{ url_for('static', filename='js/d3.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fornac.js') }}"></script>
    
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
